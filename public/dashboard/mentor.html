<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>لوحة المحتضن — حِبر</title>
  <link href="../../assets/css/main.css" rel="stylesheet" />
  <link href="../../assets/css/dashboard.css" rel="stylesheet" />
</head>
<body class="rtl" data-role="mentor">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="brand"><img id="logo_hibre" src="../../logo.png" alt="حِبر"/><div class="fw-700 mt-6">حِبر — محتضن</div></div>
      <nav class="nav">
        <a href="mentor.html" class="active">طلبات الاحتضان</a>
        <a href="#incubator">المشاريع المحتضنة</a>
        <a href="#reports">التقارير</a>
      </nav>
      <div class="mt-18"><button class="btn-logout" onclick="DashAuth.logout()">تسجيل الخروج</button></div>
    </aside>
    <main class="dash-main">
      <header class="dash-topbar">
        <div>
          <h2>لوحة المحتضن</h2>
        </div>
        <div class="controls">
          <button id="dashToggle" class="btn-ghost" aria-label="قائمة">☰</button>
          <button data-toggle-theme class="btn-ghost">تبديل السمة</button>
        </div>
      </header>
      <section class="card"><h3>طلبات الاحتضان</h3><p class="muted">قوائم الطلبات وحالتها.</p></section>
      <section class="card" style="margin-top:12px">
        <h3>قائمة الطلبات الواردة</h3>
        <div id="incRequestsList" style="margin-top:12px"></div>
      </section>
      <section class="card mt-12 hidden" id="incubatorProjectsSection">
        <h3>المشاريع المحتضنة</h3>
        <p class="muted">المشاريع التي تم قبولها للاحتضان.</p>
        <div id="incubatorProjectsList" class="mt-10"></div>
      </section>
      <section class="card mt-12 hidden" id="reportsSection">
        <h3>التقارير</h3>
        <p class="muted">تقارير وإحصاءات عن طلبات الاحتضان.</p>
        <div id="reportsList" class="mt-10"></div>
      </section>
    </main>
  </div>
  <script src="../../assets/js/dashboard.js"></script>
  <script src="../../assets/js/incubator.js"></script>
  <script src="../../assets/js/mentor.js"></script>
  <script>if(!DashAuth.ensureRole(['mentor'])){}</script>
</body>
</html>
