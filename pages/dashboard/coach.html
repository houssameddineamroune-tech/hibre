<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>لوحة المدرب — حِبر</title>
  <link href="../../assets/css/main.css" rel="stylesheet" />
  <link href="../../assets/css/dashboard.css" rel="stylesheet" />
</head>
<body class="rtl" data-role="coach">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="brand"><img id="logo_hibre" src="../../logo.png" alt="حِبر"/><div class="fw-700 mt-6">حِبر — مدرب</div></div>
      <nav class="nav">
        <a href="coach.html" class="active">إدارة الدورات</a>
        <a href="#lessons">الدروس</a>
        <a href="#tests">الاختبارات</a>
        <a href="#reports">التقارير</a>
      </nav>
      <div class="mt-18"><button class="btn-logout" onclick="DashAuth.logout()">تسجيل الخروج</button></div>
    </aside>
    <main class="dash-main">
      <header class="dash-topbar">
        <div>
          <h2>لوحة المدرب</h2>
        </div>
        <div class="controls">
          <button id="dashToggle" class="btn-ghost" aria-label="قائمة">☰</button>
          <button data-toggle-theme class="btn-ghost">تبديل السمة</button>
        </div>
      </header>
      <section class="card" id="pageHeader"><h3>إدارة الدورات</h3><p class="muted">إنشاء وتعديل الدورات.</p></section>
      <section class="card mt-12" id="coursesSection">
        <h3>دوراتي</h3>
        <div class="mt-10"><button id="addCourseBtn" class="btn">إنشاء دورة جديدة</button></div>
        <div id="coursesList" class="mt-12"></div>
      </section>
      <section class="card mt-12 hidden" id="lessonsSection">
        <h3>الدروس</h3>
        <p class="muted">إدارة الدروس ضمن الدورات.</p>
        <div id="lessonsList" class="mt-10"></div>
      </section>

      <section class="card mt-12 hidden" id="testsSection">
        <h3>إدارة الاختبارات</h3>
        <p class="muted">إنشاء وإدارة الاختبارات.</p>
        <div id="testsList" class="mt-10"></div>
      </section>
      <!-- incubator section removed for coach role -->
      <section class="card mt-12 hidden" id="reportsSection">
        <h3>تقارير</h3>
        <p class="muted">ملخص سريع عن مشاريع الاحتضان والوثائق المرفوعة.</p>
        <div id="reportsList" class="mt-10"></div>
      </section>
    </main>
  </div>
    <script src="../../assets/js/app.js"></script>
    <script src="../../assets/js/dashboard.js"></script>
  <script src="../../assets/js/incubator.js"></script>
  <script src="../../assets/js/coach.js"></script>
  <script>if(!DashAuth.ensureRole(['coach'])){}</script>
</body>
</html>
