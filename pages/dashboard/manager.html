<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>لوحة الإدارة — حِبر</title>
  <link href="../../assets/css/main.css" rel="stylesheet" />
  <link href="../../assets/css/dashboard.css" rel="stylesheet" />
</head>
<body class="rtl" data-role="manager">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="brand"><img id="logo_hibre" src="../../logo.png" alt="حِبر"/><div class="fw-700 mt-6">حِبر — إدارة</div></div>
      <nav class="nav">
        <a href="manager.html" class="active">إدارة المستخدمين</a>
        <a href="#courses">إدارة الدورات</a>
        <a href="#market">إدارة السوق</a>
        <a href="#opps">إدارة الفرص</a>
      </nav>
      <div class="mt-18"><button class="btn-logout" onclick="DashAuth.logout()">تسجيل الخروج</button></div>
    </aside>
    <main class="dash-main">
      <header class="dash-topbar">
        <div>
          <h2>لوحة الإدارة</h2>
        </div>
        <div class="controls">
          <button id="dashToggle" class="btn-ghost" aria-label="قائمة">☰</button>
          <button data-toggle-theme class="btn-ghost">تبديل السمة</button>
        </div>
      </header>
      <section class="card"><h3>إدارة المستخدمين</h3><p class="muted">قائمة المستخدمين والمراجعات.</p></section>
      <section class="card mt-12" id="usersSection">
        <h3>قائمة المستخدمين</h3>
        <div id="usersTable" class="mt-8"></div>
      </section>

      <section class="card mt-12 hidden" id="coursesSection">
        <h3>إدارة الدورات</h3>
        <p class="muted">أضف، حرر أو احذف الدورات.</p>
        <div class="flex-justify-end mt-8"><button class="btn" id="addCourseBtn">إضافة دورة</button></div>
        <div id="coursesList" class="mt-8"></div>
      </section>

      <section class="card mt-12 hidden" id="marketSection">
        <h3>إدارة السوق</h3>
        <p class="muted">عناصر السوق / منتجات.</p>
        <div class="flex-justify-end mt-8"><button class="btn" id="addMarketBtn">إضافة عنصر</button></div>
        <div id="marketList" class="mt-8"></div>
      </section>

      <section class="card mt-12 hidden" id="oppsSection">
        <h3>إدارة الفرص</h3>
        <p class="muted">إدارة فرص العمل والتوظيف.</p>
        <div class="flex-justify-end mt-8"><button class="btn" id="addOppBtn">إضافة فرصة</button></div>
        <div id="oppsList" class="mt-8"></div>
      </section>
    </main>
  </div>
  <script src="../../assets/js/dashboard.js"></script>
  <script src="../../assets/js/manager.js"></script>
  <script>if(!DashAuth.ensureRole(['manager'])){}</script>
</body>
</html>
