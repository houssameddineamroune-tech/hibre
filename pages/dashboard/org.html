<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>لوحة المؤسسة — حِبر</title>
  <link href="../../assets/css/main.css" rel="stylesheet" />
  <link href="../../assets/css/dashboard.css" rel="stylesheet" />
</head>
<body class="rtl" data-role="org">
  <div class="dash-shell">
    <aside class="dash-sidebar">
      <div class="brand"><img id="logo_hibre" src="../../logo.png" alt="حِبر"/><div style="font-weight:700;color:inherit;margin-top:6px">حِبر — مؤسسة</div></div>
      <nav class="nav">
        <a href="org.html" class="active">الملف المؤسسي</a>
        <a href="#opps">الفرص</a>
        <a href="#requests">طلبات التقديم</a>
      </nav>
      <div style="margin-top:18px"><button class="btn-logout" onclick="DashAuth.logout()">تسجيل الخروج</button></div>
    </aside>
    <main class="dash-main">
      <header class="dash-topbar">
        <div>
          <h2>لوحة المؤسسة</h2>
        </div>
        <div class="controls">
          <button id="dashToggle" class="btn-ghost" aria-label="قائمة">☰</button>
          <button data-toggle-theme class="btn-ghost">تبديل السمة</button>
        </div>
      </header>

      <!-- Company Profile -->
      <section id="profile" class="card">
        <h3>الملف المؤسسي</h3>
        <p class="muted">تحديث معلومات المؤسسة التي يراها المبدعون.</p>
        <div id="orgProfile" style="margin-top:12px"></div>
      </section>

      <!-- Opportunities -->
      <section id="opps" class="card" style="margin-top:12px">
        <h3>نشر الفرص</h3>
        <div style="margin-top:10px"><button id="addOppBtn" class="btn">نشر فرصة</button></div>
        <div id="oppsList" style="margin-top:12px"></div>
      </section>

      <!-- Applications -->
      <section id="requests" class="card" style="margin-top:12px">
        <h3>طلبات التقديم على الفرص</h3>
        <p class="muted">الطلبات التي قدّمها المبدعون إلى فرصكم.</p>
        <div id="oppsAppsList" style="margin-top:12px"></div>
      </section>

    </main>
  </div>
  <script src="../../assets/js/dashboard.js"></script>
  <script src="../../assets/js/org.js"></script>
  <script>if(!DashAuth.ensureRole(['org'])){}</script>
</body>
</html>
